  expected_paths:
    - demo_project/README.md
  forbidden:
    - Do not use AI to write the whole implementation
ai_review:
  enabled: false
  provider: none
  prompt: Check whether the implementation satisfies the quest requirements. Give pass/fail and explain why.
notes: ""

