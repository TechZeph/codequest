id: repo-init-001
title: Create a README generator
status: not_started
difficulty: beginner
mode: green
summary: Create a script that makes a project folder and writes a README.md file.
skills:
  cli: 10
  files: 20
  logic: 10
requirements:
  - A Python file exists at src/repo_init_lite/main.py
  - Running the script creates a new project folder
